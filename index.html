<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="3; url=obsidian-daily-notes-to-ics.html" />
  <title>Markdown to Calendar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      background-color: #ffffff;
      color: #000000;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background-color: #121212;
      color: #ffffff;
    }

    button {
      margin-top: 20px;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }

    a {
      color: #007bff;
    }

    body.dark a {
      color: #66b2ff;
    }
  </style>

  <script>
    function toggleTheme() {
      document.body.classList.toggle("dark");

      // save preference
      if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
      } else {
        localStorage.setItem("theme", "light");
      }
    }

    // load saved theme
    window.onload = function () {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        document.body.classList.add("dark");
      }
    };
  </script>
</head>

<body>
  <h2>Redirecting to Markdown Converter...</h2>
  <p>
    You will be redirected shortly.  
    <br />
    <a href="obsidian-daily-notes-to-ics.html">
      Click here if not redirected.
    </a>
  </p>

  <button onclick="toggleTheme()">Toggle Theme</button>
</body>
</html>
